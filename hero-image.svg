<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" role="img" aria-label="Silueta oscura con iluminación verde neón">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00141a"/>
      <stop offset="100%" stop-color="#020607"/>
    </linearGradient>
    <radialGradient id="neon" cx="52%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1cff72"/>
      <stop offset="45%" stop-color="#10d85f"/>
      <stop offset="100%" stop-color="#0a1110" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#bg)"/>
  <ellipse cx="640" cy="400" rx="315" ry="210" fill="url(#neon)" filter="url(#glow)"/>

